<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="assets/css/styles.css" rel="stylesheet">
<title>تسجيل الدخول</title></head>
<body>
<div id="appLoader" class="app-loader d-none"><div class="spinner-border text-light" role="status"></div><div class="mt-3">جاري تحميل البيانات...</div></div>

<main class="container py-4">
  <div class="login-wrap">
    <div class="login-card">
      <div class="text-center mb-4">
        <h1 class="h3 mb-2">دخول النظام</h1>
        <p class="text-muted mb-0">نظام إدارة الشاليهات والاستراحات</p>
      </div>
      <div class="mb-3">
        <label class="form-label">اسم المستخدم</label>
        <input id="username" class="form-control" value="admin">
      </div>
      <div class="mb-3">
        <label class="form-label">كلمة المرور</label>
        <input id="password" class="form-control" type="password" value="1234">
      </div>
      <button class="btn btn-primary w-100" id="loginBtn">دخول</button>
    </div>
  </div>
</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/app.js"></script>

<script src="assets/js/login.js"></script>
</body></html>
